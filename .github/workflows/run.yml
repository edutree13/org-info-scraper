name: Auto Scraper

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:      # 수동 실행 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    # 경고에서 요구한 Node.js 24 강제 설정 추가
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # v3에서 v4로 업데이트 (Node.js 24 대응)

      - name: Setup Python
        uses: actions/setup-python@v5  # v4에서 v5로 업데이트 (Node.js 24 대응)
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 openpyxl

      - name: Run Scraper
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python main.py

      - name: Commit and Push results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 변경사항 확인 및 저장
          git add output.csv
          git commit -m "Update search results" || echo "No changes to commit"
          
          # 충돌 방지를 위해 서버 내용을 먼저 가져온 후 올리기
          git pull --rebase origin main
          git push origin main
